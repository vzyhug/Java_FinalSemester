<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập | Vietnam Expeditions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
            url('https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=2070'); /* Ảnh Vịnh Hạ Long */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.95);
        }
        .btn-primary-custom {
            background-color: #2D318C; /* Màu từ giao diện web */
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary-custom:hover {
            background-color: #1a1d5a;
            transform: translateY(-1px);
        }
        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            border-color: #2D318C;
            box-shadow: 0 0 0 0.25rem rgba(45, 49, 140, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card p-4">
                <div class="text-center mb-4">
                    <h2 style="color: #2D318C; font-weight: 700;">Vietnam Expeditions</h2>
                    <p class="text-muted">Chào mừng bạn trở lại!</p>
                </div>


                <form th:action="@{/customer/login}" method="post">
                    <div th:if="${error}" class="alert alert-danger text-center small p-2 mb-3">
                        <span th:text="${error}"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email hoặc Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                            <input type="text" name="email" class="form-control" placeholder="Nhập email của bạn" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 text-white mb-3">Đăng nhập</button>

                    <div class="text-center">
                        <p class="small mb-0">Bạn chưa có tài khoản?
                            <a th:href="@{/customer/registerForm}" class="fw-bold text-decoration-none" style="color: #2D318C;">Đăng ký ngay</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
